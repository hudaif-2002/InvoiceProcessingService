<div class="container">

  <h2>Register</h2>

  <input type="text"
         placeholder="Username"
         [(ngModel)]="username">

  <br><br>

  <input type="password"
         placeholder="Password"
         [(ngModel)]="password">

  <br><br>

  <button (click)="register()">
    Register
  </button>

</div>
